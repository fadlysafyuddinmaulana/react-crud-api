services:
  frontend:
    build:
      context: ./frontend-react
    container_name: react_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend-laravel
    container_name: laravel_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend-laravel:/app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_DATABASE: react_crud_db
      DB_USERNAME: postgres
      DB_PASSWORD: Sekolah45
      PYTHON_SERVICE_URL: http://python-service:8001
      PYTHON_SERVICE_TIMEOUT: 30
    command: >
      sh -c "php artisan config:clear &&
             until php artisan migrate --force; do
               echo 'Waiting for PostgreSQL...';
               sleep 2;
             done &&
             php artisan db:seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      postgres_db:
        condition: service_healthy

  python-service:
    build:
      context: ./python-service
    container_name: python_fastapi
    ports:
      - "8001:8001"
    volumes:
      - ./python-service:/app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:Sekolah45@postgres_db:5432/react_crud_db
    depends_on:
      postgres_db:
        condition: service_healthy

  postgres_db:
    image: postgres:13
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sekolah45
      POSTGRES_DB: react_crud_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d react_crud_db"]
      interval: 10s
      timeout: 5s
      retries: 5
